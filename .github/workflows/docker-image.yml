name: Docker Image CI

on:
  push:
    tags:
      - "v*"

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract tag version
        id: meta
        run: echo "version=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"

      - name: Build and push backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          platforms: linux/amd64
          push: true
          tags: |
            docker.io/suryatresna/qwen-rubik-instructor-backend:${{ steps.meta.outputs.version }}
            docker.io/suryatresna/qwen-rubik-instructor-backend:latest

      - name: Build and push frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          platforms: linux/amd64
          push: true
          build-args: |
            PUBLIC_BACKEND_URL=${{ secrets.PUBLIC_BACKEND_URL }}
          tags: |
            docker.io/suryatresna/qwen-rubik-instructor-frontend:${{ steps.meta.outputs.version }}
            docker.io/suryatresna/qwen-rubik-instructor-frontend:latest

  deploy:
    name: Deploy to Docker-Rubik-Hackathon (Alibaba Cloud)
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Pull and restart containers on server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.ALICLOUD_SERVER_HOST }}
          username: ${{ secrets.ALICLOUD_SERVER_USER }}
          key: ${{ secrets.ALICLOUD_SERVER_SSH_KEY }}
          script: |
            docker pull docker.io/suryatresna/qwen-rubik-instructor-backend:latest
            docker pull docker.io/suryatresna/qwen-rubik-instructor-frontend:latest
            cd /opt/qwen-rubik-instructor
            docker compose pull
            docker compose up -d --remove-orphans
