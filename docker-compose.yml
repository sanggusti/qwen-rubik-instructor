services:
  backend:
    build:
      context: ./backend
    ports:
      - "8000:8000"
    environment:
      DASHSCOPE_API_KEY: ${DASHSCOPE_API_KEY}
      CORS_ORIGINS: '["http://localhost:8080"]'
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        PUBLIC_BACKEND_URL: http://localhost:8000
    ports:
      - "8080:80"
    depends_on:
      - backend
    restart: unless-stopped
